<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Pages</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f9fafb;
      }

      main {
        width: min(90vw, 36rem);
      }

      h1 {
        margin-bottom: 0.5rem;
        font-size: 1.75rem;
      }

      ul {
        list-style: none;
        padding: 0;
        display: grid;
        gap: 0.75rem;
      }

      a {
        display: block;
        padding: 0.9rem 1rem;
        border: 1px solid #374151;
        border-radius: 0.6rem;
        text-decoration: none;
        color: inherit;
        background: #1f2937;
      }

      a:hover {
        background: #374151;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>My pages</h1>
      <ul>
        <li><a href="https://lateweb.github.io/lista">lista</a></li>
        <li><a href="https://lateweb.github.io/nhl11fin">nhl11fin</a></li>
        <li><a href="https://lateweb.github.io/pyrpas">pyrpas</a></li>
        <li><a href="https://lateweb.github.io/visa">visa</a></li>
        <li><a href="https://lateweb.github.io/aiohje">aiohje</a></li>
      </ul>
    </main>
  </body>
</html>
